name = "trmnl-alexa-shopping"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for storing per-user Bring! credentials (encrypted).
# Run: wrangler kv namespace create USERS
# Then paste the id below.
[[kv_namespaces]]
binding = "USERS"
id = ""  # paste your KV namespace ID here after running: wrangler kv namespace create USERS

# Secrets (set via `wrangler secret put <NAME>`):
#   ENCRYPTION_KEY  — 64-char hex string for AES-256-GCM encryption of stored creds
#
# Optional environment variables:
[vars]
PLUGIN_NAME = "Bring! Shopping List"
